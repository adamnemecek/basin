[package]
name = "basin"
version = "0.0.1"
edition = "2021"
rust-version = "1.84.1"
description = "An optimization library for Rust"
license = "MIT"
readme = "README.md"
repository = "https://github.com/jolars/basin"
keywords = ["optimization", "math", "numerics", "solver"]
categories = ["mathematics", "science"]

[lib]
name = "basin"
path = "src/lib.rs"

[features]
default = []
# Pin one version per backend (tenet 2 in AGENTS.md). A nalgebra major bump
# becomes a basin major bump — do not introduce per-version features.
nalgebra = ["dep:nalgebra"]

[dependencies]
# Pinned to 0.33 because nalgebra 0.34 sets rust-version = 1.87, above basin's
# MSRV of 1.84.1 (CRAN constraint — see AGENTS.md). Revisit when CRAN's pin moves.
nalgebra = { version = "0.33", optional = true }
# Re-exports `std::time::Instant` on native and a wasm-compatible shim on
# `wasm32-unknown-unknown`, so `MaxTime` works on both without feature gating.
# Tiny crate, MSRV 1.60, no transitive deps on native.
web-time = "1"

[dev-dependencies]
# Benches are hand-rolled (no criterion/divan) because their transitive
# clap dep tree requires edition2024 (Rust 1.85+), above basin's MSRV 1.84.1
# (CRAN constraint — see AGENTS.md). Revisit when CRAN's Rust pin moves.

[[bench]]
name = "rosenbrock"
harness = false

[[test]]
name = "rosenbrock_nalgebra"
required-features = ["nalgebra"]
