<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon"
              type="image/png"
              href="%sveltekit.assets%/favicon-96x96.png"
              sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
        <link rel="icon"
              type="image/svg+xml"
              href="%sveltekit.assets%/favicon-dark.svg"
              media="(prefers-color-scheme: dark)" />
        <link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
        <link rel="apple-touch-icon"
              sizes="180x180"
              href="%sveltekit.assets%/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Basin" />
        <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!-- Per-page <title>, description, and the dynamic og:/twitter:
             title/description/url are set via `$lib/Seo.svelte` — NOT
             here. A static tag in this template plus a per-page one in
             `<svelte:head>` would emit duplicate <title>/description tags
             (SvelteKit doesn't dedupe meta across the two). Only the
             page-invariant social tags live below. -->
        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Basin" />
        <meta property="og:locale" content="en_US" />
        <!-- Absolute URL: social crawlers don't resolve relative paths,
             and prerendering can't supply the origin. Hardcoded to the
             basin.bz apex domain, matching the SITE_ORIGIN constant in
             Seo.svelte / sitemap.xml / robots.txt — change all of them
             together if the deploy origin moves. -->
        <meta property="og:image" content="https://basin.bz/og.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt"
              content="The Basin wordmark beside a low-poly mountain whose river traces an optimizer's path down into a basin." />
        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:image" content="https://basin.bz/og.png" />
        <!-- No-FOUC: resolve the saved theme and set the class on <html>
             before first paint, so prerendered content doesn't flash the
             wrong colors. Mirrors `src/lib/theme.svelte.ts` (key
             `basin.theme`, default `auto`). -->
        <script>
            (function () {
                try {
                    var pref = localStorage.getItem('basin.theme');
                    if (pref !== 'light' && pref !== 'dark' && pref !== 'auto')
                        pref = 'auto';
                    var dark =
                        pref === 'dark' ||
                        (pref === 'auto' &&
                            window.matchMedia &&
                            window.matchMedia('(prefers-color-scheme: dark)')
                                .matches);
                    var root = document.documentElement;
                    root.classList.add(dark ? 'dark' : 'light');
                    root.style.colorScheme = dark ? 'dark' : 'light';
                } catch (e) {
                    /* private mode / no storage — fall back to light */
                }
            })();
        </script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover"
          class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
