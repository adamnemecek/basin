name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt
        run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features --all-targets -- -D warnings

  test:
    name: test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: default
            flags: ""
          - features: nalgebra
            flags: "--features nalgebra"
          - features: ndarray
            flags: "--features ndarray"
          - features: faer
            flags: "--features faer"
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}
      - run: cargo build -p basin ${{ matrix.flags }}
      - run: cargo test -p basin ${{ matrix.flags }}

  wasm:
    name: wasm build (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: default
            flags: ""
          - features: nalgebra
            flags: "--features nalgebra"
          - features: ndarray
            flags: "--features ndarray"
          - features: faer
            flags: "--features faer"
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-${{ matrix.features }}
      - run: cargo build -p basin --target wasm32-unknown-unknown ${{ matrix.flags }}

  versionary:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - id: versionary
        uses: jolars/versionary@v0
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
