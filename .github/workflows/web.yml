name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'crates/basin/**'
      - 'crates/basin-wasm/**'
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

# A repo-level concurrency group so a fresh push cancels an in-flight
# deploy instead of stacking.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          # Pages builds don't share a cache with the per-feature CI matrix.
          key: web-wasm

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install npm dependencies
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        env:
          # Pages serves repo sites under /<repo>/. The BASIN_BASE_PATH
          # is read by svelte.config.js to set kit.paths.base.
          BASIN_BASE_PATH: /basin
        run: npm run build

      - name: Add .nojekyll
        run: touch web/build/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
